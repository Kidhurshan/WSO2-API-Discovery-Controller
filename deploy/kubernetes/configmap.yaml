apiVersion: v1
kind: ConfigMap
metadata:
  name: adc-config
  namespace: adc-system
  labels:
    app: adc
data:
  config.toml: |
    [server]
    hostname = "adc-host"
    mode = "kubernetes"
    health_port = 8090
    log_level = "info"
    log_format = "json"

    [server.retention]
    discovered_retention = "30d"
    managed_api_retention = "90d"
    unmanaged_retention = "90d"

    [discovery.source]
    type = "deepflow"
    server_ip = "deepflow-server.deepflow-system"
    querier_port = 20416
    query_mode = "sql_api"

    [discovery.schedule]
    poll_interval = "5m"
    safety_lag = "2m"
    max_signatures_per_cycle = 1000

    [managed.source]
    type = "wso2_apim"
    base_url = "https://apim.example.com:9443"
    api_version = "v4"
    verify_ssl = true

    [managed.source.auth]
    auth_type = "basic"
    username = "admin"
    password = "admin"

    [managed.schedule]
    poll_interval = "10m"
    request_timeout = "30s"

    [managed.sync]
    context_pass_through = false
    include_api_types = ["HTTP"]

    [comparison]
    enabled = true
    stale_after = "7d"

    [spec_generation]
    enabled = true

    [spec_generation.content]
    include_traffic_stats = true
    include_k8s_metadata = true
    include_legacy_metadata = true
    include_network_metadata = true
    include_sample_urls = true

    [service_catalog]
    enabled = true
    auto_push = true
    push_shadow = true
    push_drift = true
    re_push_deleted = false

    [catalog.datastore]
    type = "postgresql"
    host = "postgres.adc-system"
    port = 5432
    database = "adc"
    user = "adc_user"
    password = "adc_password"
    max_connections = 10
    ssl_mode = "disable"
