apiVersion: apps/v1
kind: Deployment
metadata:
  name: adc
  namespace: adc-system
  labels:
    app: adc
    app.kubernetes.io/name: adc
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adc
  template:
    metadata:
      labels:
        app: adc
    spec:
      serviceAccountName: adc
      terminationGracePeriodSeconds: 60
      containers:
      - name: adc
        image: wso2/adc:latest
        # Use IfNotPresent so air-gapped clusters and locally-imported
        # images (k3s ctr import / kind load) work without a registry.
        # Override to Always when pulling from a real registry.
        imagePullPolicy: IfNotPresent
        args: ["--config", "/etc/adc/config.toml"]
        ports:
        - name: health
          containerPort: 8090
          protocol: TCP
        # Inject DB credentials from postgres-secret. ADC's config loader
        # expands ${POSTGRES_DB}, ${POSTGRES_USER}, ${POSTGRES_PASSWORD}
        # references in adc-configmap.yaml against this environment.
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: config
          mountPath: /etc/adc
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /readyz
            port: health
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: config
        configMap:
          name: adc-config
