# PostgreSQL credentials for the bundled ADC database.
#
# This Secret is referenced by both:
#   - postgres-deployment.yaml  (used as POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB)
#   - adc-deployment.yaml       (used to inject the same values into ADC's config)
#
# Rotate credentials by editing this Secret and restarting both deployments.
#
# Production note: change the default password before exposing this cluster
# beyond a trusted boundary. For external PostgreSQL, see docs/external-postgres.md.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: adc-system
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: adc
type: Opaque
stringData:
  POSTGRES_DB: adc
  POSTGRES_USER: adc_user
  POSTGRES_PASSWORD: adc_password
