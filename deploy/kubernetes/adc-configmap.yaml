# ADC configuration mounted into the adc pod at /etc/adc/config.toml.
#
# Edit this file to enable phases (discovery / managed / comparison /
# spec_generation / service_catalog) and to point ADC at your DeepFlow
# and WSO2 APIM endpoints.
#
# Database settings default to the bundled PostgreSQL deployed by
# postgres-deployment.yaml. Credentials are sourced from postgres-secret.yaml
# at runtime via env vars in adc-deployment.yaml — the values listed in
# [catalog.datastore] are placeholders that get overridden.
#
# To use external PostgreSQL: see docs/external-postgres.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: adc-config
  namespace: adc-system
  labels:
    app: adc
data:
  config.toml: |
    [server]
    hostname = "adc-host"
    mode = "kubernetes"
    health_port = 8090
    log_level = "info"
    log_format = "json"

    [server.retention]
    discovered_retention = "30d"
    managed_api_retention = "90d"
    unmanaged_retention = "90d"

    # Phase 1: Traffic Discovery — disabled by default. Set type = "deepflow"
    # and fill in your DeepFlow endpoint to enable.
    [discovery.source]
    type = ""
    server_ip = ""
    querier_port = 20416
    query_mode = "sql_api"

    [discovery.schedule]
    poll_interval = "5m"
    safety_lag = "2m"
    max_signatures_per_cycle = 1000

    [discovery.traffic_filter]
    protocol = 6
    l7_protocols = ["HTTP", "HTTP2"]
    min_direction_score = 200
    observation_point = "s-p"

    # Phase 2: Managed API Sync — disabled by default. Set type = "wso2_apim"
    # and fill in your APIM endpoint + credentials to enable.
    [managed.source]
    type = ""
    base_url = ""
    api_version = "v4"
    verify_ssl = false

    [managed.source.auth]
    auth_type = "basic"
    username = ""
    password = ""

    [managed.schedule]
    poll_interval = "10m"
    request_timeout = "30s"

    [managed.sync]
    context_pass_through = false
    include_api_types = ["HTTP"]

    # Phase 3: Comparison — requires Phase 2.
    [comparison]
    enabled = false
    stale_after = "7d"

    # Phase 4: OpenAPI Spec Generation.
    [spec_generation]
    enabled = false

    [spec_generation.content]
    include_traffic_stats = true
    include_k8s_metadata = true
    include_legacy_metadata = true
    include_network_metadata = true
    include_sample_urls = true

    # Phase 5: Service Catalog Push — requires Phase 2.
    [service_catalog]
    enabled = false
    auto_push = true
    push_shadow = true
    push_drift = true
    re_push_deleted = false

    # Bundled PostgreSQL — host points at the in-cluster postgres service.
    # database/user/password are injected from postgres-secret.yaml at runtime
    # via envFrom in adc-deployment.yaml. ADC's config loader expands ${VAR}
    # references against the pod environment before TOML parsing.
    #
    # To use external PostgreSQL: replace host with your DB hostname, set the
    # POSTGRES_* env vars in adc-deployment.yaml directly (or point at your own
    # Secret), set ssl_mode = "require", and remove the postgres-* resources
    # from kustomization.yaml. See docs/external-postgres.md.
    [catalog.datastore]
    type = "postgresql"
    host = "postgres.adc-system"
    port = 5432
    database = "${POSTGRES_DB}"
    user = "${POSTGRES_USER}"
    password = "${POSTGRES_PASSWORD}"
    max_connections = 10
    ssl_mode = "disable"
