[server]
hostname = "adc-docker"
mode = "standalone"
health_port = 8090
log_level = "info"
log_format = "json"
log_output = "stdout"

[server.retention]
discovered_retention = "30d"
managed_api_retention = "90d"
unmanaged_retention = "90d"

[discovery.source]
type = "deepflow"
server_ip = "deepflow.example.com"
querier_port = 30617
version = "v7.0"
query_mode = "sql_api"

[discovery.schedule]
poll_interval = "2m"
safety_lag = "1m"
max_signatures_per_cycle = 1000

[discovery.traffic_filter]
protocol = 6
l7_protocols = ["HTTP", "HTTP2"]
min_direction_score = 200
observation_point = "s-p"

[discovery.noise_filter]
path_patterns = [
    "/health", "/healthz", "/ping", "/ready", "/readiness",
    "/liveness", "/actuator",
    "/agent.Synchronizer", "/grpc.health.v1.HealthService",
    "/controller.", "/tagrecorder.",
    "/metadata", "/machine", "/vmSettings", "/vmAgentLog",
    "/latest/meta-data", "/computeMetadata",
    "/apis/", "/api/v1/",
    "/favicon.ico", "/.well-known", "/swagger", "/openapi",
    "/robots.txt", "/.env",
]
path_exact = ["/", "/version", "/metrics"]
excluded_ports = [8280, 8243, 9443, 9763]
excluded_domains = ["169.254.169.254", "gateway.example.com"]
excluded_agent_ids = []

[discovery.normalization]
version_pattern = "^v?[0-9]+\\.[0-9]+(\\.[0-9]+)?$"
builtin_patterns = [
    "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$",
    "^[0-9a-fA-F]{24,}$",
    "^[0-9]+$",
    "^[A-Za-z0-9_-]{20,}={0,2}$",
    "^[A-Z]{2,5}-[A-Z0-9-]{3,}$",
]
exclude_patterns = [
    "^v?[0-9]+\\.[0-9]+(\\.[0-9]+)?$",
    "^v[0-9]+$",
    "^api$",
]

[managed.source]
type = "wso2_apim"
base_url = "https://apim.example.com:9443"
api_version = "v4"
verify_ssl = false

[managed.source.auth]
auth_type = "basic"
username = "admin"
password = "admin"

[managed.schedule]
poll_interval = "3m"
request_timeout = "30s"
max_retries = 3
page_size = 500

[managed.sync]
context_pass_through = false
include_api_types = ["HTTP"]

[comparison]
enabled = true
stale_after = "7d"

[spec_generation]
enabled = true
openapi_version = "3.0.3"

[spec_generation.content]
include_traffic_stats = true
include_k8s_metadata = true
include_legacy_metadata = true
include_network_metadata = true
include_sample_urls = true

[service_catalog]
enabled = true
auto_push = true
push_shadow = true
push_drift = true
re_push_deleted = false

[service_catalog.reconciliation]
enabled = false
cleanup_unowned = false

[catalog.datastore]
type = "postgresql"
host = "postgres"
port = 5432
database = "${POSTGRES_DB}"
user = "${POSTGRES_USER}"
password = "${POSTGRES_PASSWORD}"
max_connections = 10
ssl_mode = "disable"
