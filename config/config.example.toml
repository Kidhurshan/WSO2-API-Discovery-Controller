# WSO2 API Discovery Controller — Example Configuration

[server]
hostname = "adc-host"
mode = "standalone"
log_level = "info"
log_format = "json"
log_output = "stdout"
log_max_size_mb = 50
log_max_backups = 3
log_max_age_days = 7

[server.retention]
discovered_retention = "30d"
managed_api_retention = "90d"
unmanaged_retention = "90d"

[discovery.source]
type = "deepflow"
server_ip = "10.50.0.11"
querier_port = 30617
version = "v7.0"
query_mode = "sql_api"

[discovery.source.clickhouse]
host = "10.50.0.11"
port = 9000
user = "default"
password = ""
database = "flow_log"

[discovery.schedule]
poll_interval = "5m"
safety_lag = "2m"
max_signatures_per_cycle = 1000

[discovery.traffic_filter]
protocol = 6
l7_protocols = ["HTTP", "HTTP2"]
min_direction_score = 200
observation_point = "s-p"

[discovery.noise_filter]
path_patterns = [
    "/health", "/healthz", "/ping", "/ready", "/readiness",
    "/liveness", "/actuator",
    "/agent.Synchronizer", "/grpc.health.v1.HealthService",
    "/controller.", "/tagrecorder.",
    "/metadata", "/machine", "/vmSettings", "/vmAgentLog",
    "/latest/meta-data", "/computeMetadata",
    "/apis/", "/api/v1/",
    "/favicon.ico", "/.well-known", "/swagger", "/openapi",
    "/robots.txt", "/.env",
]
path_exact = ["/", "/version", "/metrics"]
excluded_ports = [8280, 8243, 9443, 9763]
excluded_domains = ["169.254.169.254"]
excluded_agent_ids = []

[discovery.normalization]
version_pattern = "^v?[0-9]+\\.[0-9]+(\\.[0-9]+)?$"
builtin_patterns = [
    "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$",
    "^[0-9a-fA-F]{24,}$",
    "^[0-9]+$",
    "^[A-Za-z0-9_-]{20,}={0,2}$",
    "^[A-Z]{2,5}-[A-Z0-9-]{3,}$",
    "^(?=.*[0-9])[a-zA-Z0-9]{8,}$",
]
user_patterns = []
exclude_patterns = [
    "^v?[0-9]+\\.[0-9]+(\\.[0-9]+)?$",
    "^v[0-9]+$",
    "^api$",
]

[managed.source]
type = "wso2_apim"
base_url = "https://10.50.0.10:9443"
api_version = "v4"
# SECURITY: verify_ssl = false disables TLS certificate verification for APIM.
# Set to true for production. Only use false for self-signed certs in dev/test.
verify_ssl = false

# SECURITY: The credentials below are DEVELOPMENT DEFAULTS.
# Replace them before exposing this deployment beyond localhost.
# For production, use env vars: password = "${APIM_PASSWORD}"
[managed.source.auth]
auth_type = "basic"
username = "admin"
password = "admin"
client_id = ""
client_secret = ""
token_endpoint = "https://10.50.0.10:9443/oauth2/token"
scopes = ["apim:api_view", "apim:service_catalog_view", "apim:service_catalog_create", "apim:service_catalog_update"]

[managed.schedule]
poll_interval = "10m"
request_timeout = "30s"
max_retries = 3
page_size = 500

[managed.sync]
context_pass_through = false
include_api_types = ["HTTP"]

[comparison]
enabled = true
stale_after = "7d"

[spec_generation]
enabled = true
openapi_version = "3.0.3"

[spec_generation.content]
include_traffic_stats = true
include_k8s_metadata = true
include_legacy_metadata = true
include_network_metadata = true
include_sample_urls = true
server_url_override = ""

[service_catalog]
enabled = true
auto_push = true
push_shadow = true
push_drift = true
re_push_deleted = false

[catalog.datastore]
type = "postgresql"
host = "localhost"
port = 5432
database = "adc"
user = "adc_user"
password = "adc_password"
max_connections = 10
ssl_mode = "disable"
